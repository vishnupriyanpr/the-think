# Render Blueprint — deploy both backend and frontend as services
# https://render.com/docs/blueprint-spec

services:
  # ─── Backend API ───
  - type: web
    name: the-think-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard (contains secrets)
      - key: CORS_ORIGIN
        value: https://the-think.onrender.com # Update with your actual frontend URL

  # ─── Frontend (Static Site) ───
  - type: web
    name: the-think
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://the-think-api.onrender.com/api # Update with your actual backend URL
